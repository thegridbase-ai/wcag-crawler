# Render Blueprint for WCAG Crawler
services:
  - type: web
    name: wcag-crawler-server
    env: docker
    dockerfilePath: ./packages/server/Dockerfile
    dockerContext: ./packages/server
    region: oregon
    plan: free
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: CLIENT_URL
        value: https://wcag.thegridbase.com
      - key: PORT
        value: 3001
      # Render Free has 512 MB RAM; keep Playwright + axe-core within that limit.
      - key: MAX_BROWSER_CONCURRENCY
        value: 1
